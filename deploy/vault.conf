# systemd override: pull secrets from OCI Vault into tmpfs before start.
# The dash on EnvironmentFile is load-bearing: systemd checks env files before
# running ExecStartPre, which is exactly what creates this one.
[Service]
RuntimeDirectory=oura-mcp
ExecStartPre=/usr/local/bin/oura-mcp-secrets
EnvironmentFile=-/run/oura-mcp/env
