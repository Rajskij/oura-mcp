<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101b30"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" rx="88" fill="url(#bg)"/>

  <!-- the ring: tilted torus suggested by two arcs of differing weight -->
  <g transform="rotate(-24 200 200)">
    <ellipse cx="200" cy="200" rx="118" ry="118" fill="none" stroke="url(#ring)" stroke-width="26"/>
    <!-- inner highlight to give the band depth -->
    <ellipse cx="200" cy="200" rx="118" ry="118" fill="none" stroke="#e0f2fe" stroke-opacity="0.35" stroke-width="4" stroke-dasharray="140 600" stroke-dashoffset="-40" stroke-linecap="round"/>
  </g>

  <!-- data pulse crossing the ring: a heartbeat line -->
  <path d="M96 214 L156 214 L176 178 L200 246 L224 190 L240 214 L304 214"
        fill="none" stroke="#f8fafc" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
