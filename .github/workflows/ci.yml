name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Smoke test against Oura sandbox
        run: npm run smoke

      # Catches Dockerfile breakage before merge; publishing still happens
      # only from main (see the docker job below).
      - name: Docker build check
        run: docker build -t oura-mcp:ci-check .

  deploy:
    # Ship to the production box only for commits that landed on main and passed checks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    concurrency: production
    env:
      BOX: ubuntu@157.151.235.170
      APP_DIR: /home/ubuntu/oura-mcp
      # DOMAIN/PORT must match deploy/box.env on the box (bootstrap's source of
      # truth); they render deploy/Caddyfile and the healthz URL below.
      DOMAIN: oura-mcp.duckdns.org
      PORT: "3000"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build artifact (runner arch matches the box)
        run: |
          npm ci
          npm run build
          npm ci --omit=dev
          tar czf /tmp/oura-mcp.tgz dist node_modules package.json package-lock.json

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "157.151.235.170 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFbmfexKUOtoVqY7RUfJWMm7IW0oyy4n4IgoXdZrUMoJ" > ~/.ssh/known_hosts

      - name: Deploy and restart
        run: |
          scp -i ~/.ssh/deploy_key /tmp/oura-mcp.tgz "$BOX:/tmp/oura-mcp.tgz"
          ssh -i ~/.ssh/deploy_key "$BOX" "
            set -e
            rm -rf $APP_DIR/dist $APP_DIR/node_modules
            tar xzf /tmp/oura-mcp.tgz -C $APP_DIR
            rm /tmp/oura-mcp.tgz
            sudo systemctl restart oura-mcp
          "

      # Keep the reverse proxy config in sync with the repo, safely. Rendered here,
      # validated on the box, and applied only when it differs from what is live.
      # The live config is backed up first and restored if the reload fails, so
      # /etc/caddy/Caddyfile never gets ahead of the running Caddy (a bad file on
      # disk would otherwise load on the next reboot). On a successful reload the
      # .prev backup is left as the rollback anchor for the Verify health step.
      - name: Sync Caddy config
        run: |
          envsubst '$DOMAIN $PORT' < deploy/Caddyfile > /tmp/Caddyfile.rendered
          scp -i ~/.ssh/deploy_key /tmp/Caddyfile.rendered "$BOX:/tmp/Caddyfile.rendered"
          ssh -i ~/.ssh/deploy_key "$BOX" '
            set -e
            sudo caddy validate --adapter caddyfile --config /tmp/Caddyfile.rendered
            if sudo cmp -s /tmp/Caddyfile.rendered /etc/caddy/Caddyfile; then
              echo "Caddyfile unchanged"
              sudo rm -f /etc/caddy/Caddyfile.prev
              rm -f /tmp/Caddyfile.rendered
              exit 0
            fi
            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.prev
            sudo cp /tmp/Caddyfile.rendered /etc/caddy/Caddyfile
            rm -f /tmp/Caddyfile.rendered
            if ! sudo systemctl reload caddy; then
              sudo cp /etc/caddy/Caddyfile.prev /etc/caddy/Caddyfile
              sudo systemctl reload caddy || true
              sudo rm -f /etc/caddy/Caddyfile.prev
              echo "caddy reload failed -> restored previous config"
              exit 1
            fi
            echo "Caddyfile changed -> reloaded"
          '

      # Confirms the app AND the reloaded proxy serve real HTTPS traffic. If health
      # fails and this deploy changed the Caddyfile (.prev present), roll the proxy
      # back to the previous config so the site keeps serving; the job still fails.
      - name: Verify health
        run: |
          ok=""
          for i in $(seq 1 10); do
            if curl -sf "https://$DOMAIN/healthz" > /dev/null; then ok=1; break; fi
            sleep 3
          done
          if [ -n "$ok" ]; then
            ssh -i ~/.ssh/deploy_key "$BOX" 'sudo rm -f /etc/caddy/Caddyfile.prev'
            echo "healthz OK"
            exit 0
          fi
          echo "healthz did not come back after deploy"
          ssh -i ~/.ssh/deploy_key "$BOX" '
            if [ -f /etc/caddy/Caddyfile.prev ]; then
              sudo cp /etc/caddy/Caddyfile.prev /etc/caddy/Caddyfile
              sudo systemctl reload caddy || true
              sudo rm -f /etc/caddy/Caddyfile.prev
              echo "restored previous Caddyfile after failed health check"
            fi
          '
          exit 1

  docker:
    # Publish the image only for commits that landed on main and passed checks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4.1.0

      - uses: docker/setup-buildx-action@v4.2.0

      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rajskij/oura-mcp:latest
            ghcr.io/rajskij/oura-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
