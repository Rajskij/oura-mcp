name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Smoke test against Oura sandbox
        run: npm run smoke

      # Catches Dockerfile breakage before merge; publishing still happens
      # only from main (see the docker job below).
      - name: Docker build check
        run: docker build -t oura-mcp:ci-check .

  deploy:
    # Ship to the production box only for commits that landed on main and passed checks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    concurrency: production
    env:
      BOX: ubuntu@157.151.235.170
      APP_DIR: /home/ubuntu/oura-mcp
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build artifact (runner arch matches the box)
        run: |
          npm ci
          npm run build
          npm ci --omit=dev
          tar czf /tmp/oura-mcp.tgz dist node_modules package.json package-lock.json

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "157.151.235.170 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFbmfexKUOtoVqY7RUfJWMm7IW0oyy4n4IgoXdZrUMoJ" > ~/.ssh/known_hosts

      - name: Deploy and restart
        run: |
          scp -i ~/.ssh/deploy_key /tmp/oura-mcp.tgz "$BOX:/tmp/oura-mcp.tgz"
          ssh -i ~/.ssh/deploy_key "$BOX" "
            set -e
            rm -rf $APP_DIR/dist $APP_DIR/node_modules
            tar xzf /tmp/oura-mcp.tgz -C $APP_DIR
            rm /tmp/oura-mcp.tgz
            sudo systemctl restart oura-mcp
          "

      - name: Verify health
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://oura-mcp.duckdns.org/healthz > /dev/null; then
              echo "healthz OK"; exit 0
            fi
            sleep 3
          done
          echo "healthz did not come back after deploy"; exit 1

  docker:
    # Publish the image only for commits that landed on main and passed checks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rajskij/oura-mcp:latest
            ghcr.io/rajskij/oura-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
